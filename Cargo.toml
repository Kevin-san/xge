
[workspace]
members = [
    "crates/compiler",
    "crates/lexer",
    "crates/parser",
    "crates/hir",
    "crates/mir",
    "crates/codegen",
    "crates/runtime",
    "crates/stdlib",
    "crates/ai",
    "crates/dsl",
    "crates/cli",
]
resolver = "2"

[workspace.dependencies]
logos = "0.14"
lalrpop-util = "0.20"
anyhow = "1.0"
thiserror = "1.0"
clap = { version = "4.5", features = ["derive"] }
indexmap = "2.2"
parking_lot = "0.12"

