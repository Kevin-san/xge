[advisories]
# Sprint 01 已知豁免项（后续 sprint 逐步修复）
ignore = [
    "RUSTSEC-2025-0141", # bincode unmaintained — Sprint 02 迁移至 ron/bincode2
    "RUSTSEC-2024-0436", # paste unmaintained — Sprint 03 替换为手动宏
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained — Sprint 02 升级 rustls 生态
    "RUSTSEC-2026-0192", # ttf-parser unmaintained — Sprint 05 字体系统重构时替换
    "RUSTSEC-2026-0194", # xml-rs quadratic attr check — Sprint 04 升级 quick-xml
    "RUSTSEC-2026-0195", # xml-rs unbounded ns allocation — Sprint 04 升级 quick-xml
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "NCSA",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
