[advisories]
ignore = [
    "RUSTSEC-2026-0194",  # quick-xml: 间接依赖 via wayland-scanner/winit，待 winit 升级后解决
    "RUSTSEC-2026-0195",  # quick-xml: 同上
    "RUSTSEC-2025-0141",  # bincode: unmaintained，间接依赖
    "RUSTSEC-2024-0436",  # paste: unmaintained，间接依赖
    "RUSTSEC-2025-0134",  # rustls-pemfile: unmaintained，间接依赖
    "RUSTSEC-2026-0192",  # ttf-parser: unmaintained，间接依赖 via arboard/winit
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
    "NCSA",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
